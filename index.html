<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>スーパー モグラ叩き</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(#87CEEB,#bfe9ff);
text-align:center;
overflow:hidden;
}

h1{
margin:10px;
}

#titleScreen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#87ceeb;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#gameScreen{
display:none;
}

#game{
width:95vw;
max-width:520px;
margin:auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.hole{
width:100%;
aspect-ratio:1;
background:#5a3b1a;
border-radius:50%;
position:relative;
overflow:hidden;
}

.mole{
position:absolute;
width:70%;
height:70%;
left:15%;
bottom:-80%;
transition:0.15s;
cursor:pointer;
}

.mole.up{
bottom:10%;
}

.body{
width:100%;
height:70%;
background:#7a4b2a;
border-radius:50%;
position:absolute;
bottom:0;
}

.eye{
width:12%;
height:12%;
background:white;
border-radius:50%;
position:absolute;
top:20%;
}

.eye.left{left:25%}
.eye.right{right:25%}

.pupil{
width:60%;
height:60%;
background:black;
border-radius:50%;
margin:auto;
margin-top:20%;
}

.gold .body{
background:gold;
}

.bomb{
font-size:40px;
text-align:center;
line-height:80px;
}

#ui{
font-size:18px;
margin-bottom:10px;
}

button{
font-size:20px;
padding:12px 25px;
}

#gameOver{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
color:white;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

</style>
</head>

<body>

<div id="titleScreen">
<h1>スーパー モグラ叩き</h1>
<button onclick="startGame()">ゲーム開始</button>
</div>

<div id="gameScreen">

<h1>モグラ叩き</h1>

<div id="ui">
スコア: <span id="score">0</span>　
レベル: <span id="level">1</span>　
コンボ: <span id="combo">0</span>　
残り: <span id="time">30</span>
</div>

<div id="game"></div>

</div>

<div id="gameOver">
<h1>ゲーム終了</h1>
<h2 id="finalScore"></h2>
<button onclick="location.reload()">もう一度</button>
</div>

<script>

const game=document.getElementById("game")

const scoreEl=document.getElementById("score")
const levelEl=document.getElementById("level")
const comboEl=document.getElementById("combo")
const timeEl=document.getElementById("time")

const titleScreen=document.getElementById("titleScreen")
const gameScreen=document.getElementById("gameScreen")
const gameOverScreen=document.getElementById("gameOver")
const finalScore=document.getElementById("finalScore")

let score=0
let combo=0
let level=1
let time=30
let speed=900

let timer
let moleTimer

let objects=[]

const hitSound=new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg")
const bombSound=new Audio("https://actions.google.com/sounds/v1/explosions/explosion.ogg")
const goldSound=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg")

function playSound(sound){
let s=sound.cloneNode()
s.play()
}

for(let i=0;i<9;i++){

let hole=document.createElement("div")
hole.className="hole"

let mole=document.createElement("div")
mole.className="mole"

hole.appendChild(mole)
game.appendChild(hole)

objects.push(mole)

mole.addEventListener("click",hit)

}

function startGame(){

titleScreen.style.display="none"
gameScreen.style.display="block"

score=0
combo=0
level=1
time=30
speed=900

updateUI()

timer=setInterval(()=>{

time--
timeEl.textContent=time

if(time<=0) endGame()

},1000)

moleTimer=setInterval(showMole,speed)

}

function updateUI(){

scoreEl.textContent=score
comboEl.textContent=combo
levelEl.textContent=level
timeEl.textContent=time

}

function showMole(){

objects.forEach(o=>{
o.classList.remove("up")
})

let index=Math.floor(Math.random()*objects.length)
let obj=objects[index]

let type="normal"

let r=Math.random()

if(r<0.15) type="bomb"
else if(r<0.30) type="gold"

obj.dataset.type=type

if(type==="bomb"){

obj.innerHTML="💣"
obj.className="mole bomb"

}else{

obj.className="mole"

let goldClass=type==="gold"?"gold":""

obj.innerHTML=`
<div class="body ${goldClass}"></div>
<div class="eye left"><div class="pupil"></div></div>
<div class="eye right"><div class="pupil"></div></div>
`

}

obj.classList.add("up")

setTimeout(()=>{

if(obj.classList.contains("up")){
combo=0
comboEl.textContent=combo
}

obj.classList.remove("up")

},speed-200)

}

function hit(e){

let obj=e.currentTarget

if(!obj.classList.contains("up")) return

navigator.vibrate?.(30)

let type=obj.dataset.type

if(type==="bomb"){

playSound(bombSound)

score-=5
combo=0

}else if(type==="gold"){

playSound(goldSound)

combo++
score+=5+combo

}else{

playSound(hitSound)

combo++
score+=1+Math.floor(combo/5)

}

obj.classList.remove("up")

updateUI()

if(score>level*20){

level++
speed*=0.85

clearInterval(moleTimer)
moleTimer=setInterval(showMole,speed)

updateUI()

}

}

function endGame(){

clearInterval(timer)
clearInterval(moleTimer)

finalScore.textContent="スコア: "+score

gameOverScreen.style.display="flex"

}

</script>

</body>
</html>
