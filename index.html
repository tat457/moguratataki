<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>最強モグラ叩き</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(#7ecbff,#bfe9ff);
text-align:center;
overflow:hidden;
}

#title{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#gameScreen{display:none;}

#game{
width:95vw;
max-width:520px;
margin:auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.hole{
width:100%;
aspect-ratio:1;
background:#5a3b1a;
border-radius:50%;
position:relative;
overflow:hidden;
}

.mole{
position:absolute;
width:70%;
height:70%;
left:15%;
bottom:-80%;
transition:0.15s;
cursor:pointer;
}

.mole.up{bottom:10%;}

.body{
width:100%;
height:70%;
background:#7a4b2a;
border-radius:50%;
position:absolute;
bottom:0;
}

.eye{
width:12%;
height:12%;
background:white;
border-radius:50%;
position:absolute;
top:20%;
}

.eye.left{left:25%}
.eye.right{right:25%}

.pupil{
width:60%;
height:60%;
background:black;
border-radius:50%;
margin:auto;
margin-top:20%;
}

.gold .body{background:gold;}
.time .body{background:deepskyblue;}

.bomb{
font-size:40px;
text-align:center;
line-height:80px;
}

.boss .body{
background:red;
transform:scale(1.3);
}

.popup{
position:absolute;
color:white;
font-weight:bold;
animation:pop 0.6s forwards;
}

@keyframes pop{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-40px);opacity:0}
}

#ui{font-size:18px;margin-bottom:10px;}

button{
font-size:18px;
padding:10px 20px;
margin:5px;
}

#gameOver{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
color:white;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
}

</style>
</head>

<body>

<div id="title">
<h1>最強モグラ叩き</h1>
<button onclick="startGame(1)">かんたん</button>
<button onclick="startGame(0.8)">ふつう</button>
<button onclick="startGame(0.6)">むずかしい</button>
</div>

<div id="gameScreen">

<h2>モグラ叩き</h2>

<div id="ui">
スコア:<span id="score">0</span>
レベル:<span id="level">1</span>
コンボ:<span id="combo">0</span>
時間:<span id="time">30</span>
</div>

<div id="game"></div>

</div>

<div id="gameOver">
<h1>ゲーム終了</h1>
<h2 id="finalScore"></h2>
<button onclick="location.reload()">もう一度</button>
</div>

<script>

const game=document.getElementById("game")

const scoreEl=document.getElementById("score")
const comboEl=document.getElementById("combo")
const levelEl=document.getElementById("level")
const timeEl=document.getElementById("time")

const title=document.getElementById("title")
const gameScreen=document.getElementById("gameScreen")

const gameOver=document.getElementById("gameOver")
const finalScore=document.getElementById("finalScore")

let score=0
let combo=0
let level=1
let time=30

let speed=900

let timer
let moleTimer

let difficulty=1

let objects=[]

const hitSound=new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg")
const bombSound=new Audio("https://actions.google.com/sounds/v1/explosions/explosion.ogg")

function sound(a){
let s=a.cloneNode()
s.play()
}

for(let i=0;i<9;i++){

let hole=document.createElement("div")
hole.className="hole"

let mole=document.createElement("div")
mole.className="mole"

hole.appendChild(mole)
game.appendChild(hole)

objects.push(mole)

mole.addEventListener("click",hit)

}

function startGame(diff){

difficulty=diff

title.style.display="none"
gameScreen.style.display="block"

score=0
combo=0
level=1
time=30
speed=900*diff

updateUI()

timer=setInterval(()=>{

time--
timeEl.textContent=time

if(time<=0) endGame()

},1000)

moleTimer=setInterval(showMole,speed)

}

function updateUI(){

scoreEl.textContent=score
comboEl.textContent=combo
levelEl.textContent=level
timeEl.textContent=time

}

function showPopup(text,x,y){

let p=document.createElement("div")
p.className="popup"
p.style.left=x+"px"
p.style.top=y+"px"
p.innerText=text

document.body.appendChild(p)

setTimeout(()=>p.remove(),600)

}

function showMole(){

objects.forEach(o=>o.classList.remove("up"))

let obj=objects[Math.floor(Math.random()*objects.length)]

let r=Math.random()

let type="normal"

if(level>3 && r<0.1) type="boss"
else if(r<0.15) type="bomb"
else if(r<0.25) type="gold"
else if(r<0.35) type="time"

obj.dataset.type=type

obj.className="mole"

if(type==="bomb"){

obj.innerHTML="💣"
obj.classList.add("bomb")

}else{

let extra=""

if(type==="gold") extra="gold"
if(type==="time") extra="time"
if(type==="boss") extra="boss"

obj.innerHTML=`
<div class="body ${extra}"></div>
<div class="eye left"><div class="pupil"></div></div>
<div class="eye right"><div class="pupil"></div></div>
`

}

obj.classList.add("up")

setTimeout(()=>{
if(obj.classList.contains("up")){
combo=0
comboEl.textContent=combo
}
obj.classList.remove("up")
},speed-200)

}

function hit(e){

let obj=e.currentTarget

if(!obj.classList.contains("up")) return

navigator.vibrate?.(30)

let type=obj.dataset.type

let add=0

if(type==="bomb"){

sound(bombSound)

score-=5
combo=0
add=-5

}else if(type==="gold"){

sound(hitSound)

combo++
add=10+combo
score+=add

}else if(type==="time"){

sound(hitSound)

time+=3
add=3

}else if(type==="boss"){

sound(hitSound)

combo++
add=20
score+=add

}else{

sound(hitSound)

combo++
add=1+Math.floor(combo/5)
score+=add

}

let rect=obj.getBoundingClientRect()

showPopup("+"+add,rect.left+30,rect.top)

obj.classList.remove("up")

updateUI()

if(score>level*25){

level++
speed*=0.9

clearInterval(moleTimer)
moleTimer=setInterval(showMole,speed)

updateUI()

}

}

function endGame(){

clearInterval(timer)
clearInterval(moleTimer)

finalScore.innerText="スコア "+score

gameOver.style.display="flex"

}

</script>

</body>
</html>
