<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>モグラ叩き ULTIMATE</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#87CEEB;
text-align:center;
}

h1{
margin:10px;
}

#ui{
font-size:18px;
margin-bottom:10px;
}

#game{
width:95vw;
max-width:520px;
margin:auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.hole{
width:100%;
aspect-ratio:1;
background:#5a3b1a;
border-radius:50%;
position:relative;
overflow:hidden;
}

/* モグラ */

.mole{
position:absolute;
width:70%;
height:70%;
left:15%;
bottom:-80%;
transition:0.18s;
cursor:pointer;
}

.mole.up{
bottom:10%;
}

/* モグラの見た目 */

.body{
width:100%;
height:70%;
background:#7a4b2a;
border-radius:50%;
position:absolute;
bottom:0;
}

.eye{
width:10%;
height:10%;
background:white;
border-radius:50%;
position:absolute;
top:20%;
}

.eye.left{ left:25% }
.eye.right{ right:25% }

.pupil{
width:50%;
height:50%;
background:black;
border-radius:50%;
margin:auto;
margin-top:25%;
}

/* 爆弾 */

.bomb{
background:black;
border-radius:50%;
width:70%;
height:70%;
position:absolute;
left:15%;
bottom:-80%;
transition:0.18s;
}

.bomb.up{
bottom:10%;
}

button{
font-size:18px;
padding:10px 25px;
margin-top:10px;
}

#combo{
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<h1>モグラ叩き ULTIMATE</h1>

<div id="ui">
スコア: <span id="score">0</span>　
レベル: <span id="level">1</span>　
コンボ: <span id="combo">0</span>　
残り: <span id="time">30</span>
</div>

<div id="game"></div>

<button onclick="startGame()">スタート</button>

<script>

const game=document.getElementById("game")

const scoreEl=document.getElementById("score")
const levelEl=document.getElementById("level")
const comboEl=document.getElementById("combo")
const timeEl=document.getElementById("time")

let score=0
let level=1
let combo=0
let speed=900
let time=30

let timer
let moleTimer

let objects=[]

/* 音 */

const hitSound=new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg")
const bombSound=new Audio("https://actions.google.com/sounds/v1/explosions/explosion.ogg")

function playSound(sound){
let s=sound.cloneNode()
s.play()
}

/* 穴作成 */

for(let i=0;i<9;i++){

let hole=document.createElement("div")
hole.className="hole"

let obj=document.createElement("div")
obj.className="mole"

obj.innerHTML=`
<div class="body"></div>
<div class="eye left"><div class="pupil"></div></div>
<div class="eye right"><div class="pupil"></div></div>
`

hole.appendChild(obj)
game.appendChild(hole)

objects.push(obj)

obj.addEventListener("click",hit)

}

/* ゲーム開始 */

function startGame(){

score=0
level=1
combo=0
speed=900
time=30

scoreEl.textContent=score
levelEl.textContent=level
comboEl.textContent=combo
timeEl.textContent=time

timer=setInterval(()=>{

time--
timeEl.textContent=time

if(time<=0) endGame()

},1000)

clearInterval(moleTimer)
moleTimer=setInterval(showMole,speed)

}

/* モグラ表示 */

function showMole(){

objects.forEach(o=>{
o.classList.remove("up")
o.dataset.type="mole"
})

let index=Math.floor(Math.random()*objects.length)
let obj=objects[index]

if(Math.random()<0.2){

obj.dataset.type="bomb"
obj.innerHTML="💣"

}else{

obj.dataset.type="mole"

obj.innerHTML=`
<div class="body"></div>
<div class="eye left"><div class="pupil"></div></div>
<div class="eye right"><div class="pupil"></div></div>
`

}

obj.classList.add("up")

setTimeout(()=>{
obj.classList.remove("up")
},speed-200)

}

/* 叩く */

function hit(e){

let obj=e.currentTarget

if(!obj.classList.contains("up")) return

navigator.vibrate?.(30)

if(obj.dataset.type==="bomb"){

playSound(bombSound)

score-=5
combo=0

}else{

playSound(hitSound)

combo++

score+=1+Math.floor(combo/5)

}

scoreEl.textContent=score
comboEl.textContent=combo

obj.classList.remove("up")

if(score>level*15){

level++
speed*=0.85

levelEl.textContent=level

clearInterval(moleTimer)
moleTimer=setInterval(showMole,speed)

}

}

/* 終了 */

function endGame(){

clearInterval(timer)
clearInterval(moleTimer)

alert("ゲーム終了！ スコア:"+score)

}

</script>

</body>
</html>
