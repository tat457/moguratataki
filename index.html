<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>モグラ叩き</title>

<style>

body{
font-family:sans-serif;
text-align:center;
background:#bde0ff;
}

#game{
width:330px;
margin:auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.hole{
width:100px;
height:100px;
background:#5a3a1b;
border-radius:50%;
position:relative;
overflow:hidden;
}

.mole{
position:absolute;
bottom:-100px;
width:100%;
font-size:60px;
cursor:pointer;
transition:0.25s;
user-select:none;
}

.mole.up{
bottom:10px;
}

.hit{
transform:scale(0.8);
}

select{
font-size:16px;
padding:5px;
}

button{
font-size:16px;
padding:6px 12px;
}

</style>
</head>

<body>

<h1>モグラ叩き</h1>

スコア: <span id="score">0</span>
時間: <span id="time">30</span>

<br><br>

難易度:
<select id="difficulty">
<option value="easy">Easy</option>
<option value="normal" selected>Normal</option>
<option value="hard">Hard</option>
</select>

<button onclick="startGame()">スタート</button>

<br><br>

<div id="game"></div>

<script>

const game = document.getElementById("game")
const scoreText = document.getElementById("score")
const timeText = document.getElementById("time")
const difficultySelect = document.getElementById("difficulty")

let score=0
let time=30
let timer
let moles=[]

let spawnSpeed=700
let moleTime=800
let bombRate=0.2

function setDifficulty(){

const diff=difficultySelect.value

if(diff==="easy"){
spawnSpeed=900
moleTime=900
bombRate=0.1
}

if(diff==="normal"){
spawnSpeed=700
moleTime=800
bombRate=0.2
}

if(diff==="hard"){
spawnSpeed=450
moleTime=600
bombRate=0.35
}

}

function createBoard(){

game.innerHTML=""
moles=[]

for(let i=0;i<9;i++){

const hole=document.createElement("div")
hole.className="hole"

const mole=document.createElement("div")
mole.className="mole"

hole.appendChild(mole)
game.appendChild(hole)

let hit=false

mole.addEventListener("pointerdown",()=>{

if(!mole.classList.contains("up")) return
if(hit) return

hit=true

mole.classList.remove("up")
mole.classList.add("hit")

if(mole.dataset.type==="bomb"){
score-=5
}else{
score+=1
}

scoreText.textContent=score

setTimeout(()=>{
mole.classList.remove("hit")
hit=false
},200)

})

moles.push(mole)

}

}

function showMole(){

const index=Math.floor(Math.random()*moles.length)
const mole=moles[index]

if(mole.classList.contains("up")) return

if(Math.random()<bombRate){

mole.textContent="💣"
mole.dataset.type="bomb"

}else{

mole.textContent="🐹"
mole.dataset.type="mole"

}

mole.classList.add("up")

setTimeout(()=>{
mole.classList.remove("up")
},moleTime)

}

function startGame(){

setDifficulty()

score=0
time=30

scoreText.textContent=score
timeText.textContent=time

createBoard()

clearInterval(timer)

timer=setInterval(()=>{

time--
timeText.textContent=time

showMole()

if(time<=0){
clearInterval(timer)
alert("ゲーム終了！ スコア:"+score)
}

},spawnSpeed)

}

createBoard()

</script>

</body>
</html>
